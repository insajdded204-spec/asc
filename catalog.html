<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catalog - Le désir d’être</title>
  <link rel="stylesheet" href="css/shop.css" />
</head>
<body class="shop-body">
  <!-- Переиспользуемая шапка сайта, вставляется через JS -->
  <div id="header-slot"></div>

  <main class="page-section container">
    <div class="catalog-layout">
      <!-- Левая колонка: фильтр по категориям -->
      <aside class="card sidebar">
        <h2>Categories</h2>
        <ul class="category-list">
          <li><button class="category-btn active" data-category="Все коолекции">Все коллекции</button></li>
          <li><button class="category-btn" data-category="Коллекция №4">Коллекция №4</button></li>
          <li><button class="category-btn" data-category="«СОПРОТИВЛЕНИЕ»’C">«СОПРОТИВЛЕНИЕ»’C</button></li>
          <li><button class="category-btn" data-category="«Transylvania»’c">«Transylvania»’c</button></li>
          <li><button class="category-btn" data-category="«HERBIER» collection">«HERBIER» collection</button></li>
        </ul>
      </aside>

      <!-- Правая колонка: количество и сетка карточек -->
      <section>
        <p class="products-meta" id="products-count">13 products found</p>
        <div class="products-grid" id="products-grid"></div>
      </section>
    </div>
  </main>

  <script src="js/products.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/catalog.js"></script>
</body>
</html>
