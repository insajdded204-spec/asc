<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cart - FastAPI Shop</title>
  <link rel="stylesheet" href="css/shop.css" />
</head>
<body class="shop-body">
  <div id="header-slot"></div>

  <main class="page-section container">
    <!-- Блок корзины с товарами и итоговой стоимостью -->
    <h1 class="page-title">Shopping Cart</h1>
    <div class="cart-list" id="cart-list"></div>
    <p class="total-line">Total: <span id="cart-total">$0.00</span></p>
    <div class="cart-actions">
      <a class="btn btn-outline" href="catalog.html">Continue Shopping</a>
      <a class="btn btn-primary" href="checkout.html">Proceed to Checkout</a>
    </div>
  </main>

  <script src="js/router.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/cart-page.js"></script>
</body>
</html>
